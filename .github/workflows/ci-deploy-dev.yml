name: CI + Deploy Dev

on:
  pull_request:
    branches: [ "dev" ]
  push:
    branches: [ "dev" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      # Versão antiga comentada para validação:
      # - name: Instalar Databricks CLI nova
      #   run: |
      #     curl -L https://github.com -o databricks.tar.gz
      #     tar -xzf databricks.tar.gz
      #     sudo mv databricks /usr/local/bin/

      # Nova configuração que busca sempre a versão mais recente:
      - name: Instalar Databricks CLI (Sempre a mais recente)
        run: |
          curl -fsSL https://githubusercontent.com | sudo sh
          databricks -v # Exibe a versão instalada no log para conferência
      - name: Validar bundle (Dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          cd mentoria
          databricks bundle validate

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      # Versão antiga comentada para validação:
      # - name: Instalar Databricks CLI nova
      #   run: |
      #     curl -L https://github.com -o databricks.tar.gz
      #     tar -xzf databricks.tar.gz
      #     sudo mv databricks /usr/local/bin/

      # Nova configuração que busca sempre a versão mais recente:
      - name: Instalar Databricks CLI (Sempre a mais recente)
        run: |
          curl -fsSL https://githubusercontent.com | sudo sh
          databricks -v # Exibe a versão instalada no log para conferência
      - name: Deploy no Dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          cd mentoria
          databricks bundle deploy --target dev
