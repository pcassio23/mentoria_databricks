bundle:
  name: mentoria

include:
  - resources/jobs/*.yml
  - resources/pipelines/*.yml

# artifacts:
#   python_artifact:
#     type: whl
#     build: uv build --wheel

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use (for sample resources)
  bronze_schema:
    description: The schema to use for bronze layer
  silver_schema:
    description: The schema to use for silver layer
  env:
    description: The environment name (dev, prod, staging, etc.)

targets:
  dev:
    mode: development
    default: true
    workspace:
      #host: ${DATABRICKS_HOST}
      root_path: /Workspace/Users/pcassio23@gmail.com/Mentoria_Dev
    variables:
      catalog: dev_catalog
      schema: bronze
      bronze_schema: bronze
      silver_schema: silver
      env: dev

  prod:
    mode: production
    workspace:
      #host: ${DATABRICKS_HOST}
      root_path: /Workspace/Mentoria_Prod
    variables:
      catalog: prod_catalog
      schema: bronze
      bronze_schema: bronze
      silver_schema: silver
      env: prod
    permissions:
      - level: CAN_MANAGE
        user_name: pcassio23@gmail.com
