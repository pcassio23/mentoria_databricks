bundle:
  name: mentoria

include:
  - resources/jobs/*.yml
  - resources/pipelines/*.yml

# artifacts:
#   python_artifact:
#     type: whl
#     build: uv build --wheel

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${DATABRICKS_HOST}
      root_path: /Workspace/Users/pcassio23@gmail.com/Mentoria_Dev
    variables:
      catalog: dev_catalog
      schema: bronze

  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}
      root_path: /Workspace/Mentoria_Prod
    variables:
      catalog: prod_catalog
      schema: bronze
    permissions:
      - level: CAN_MANAGE
        user_name: pcassio23@gmail.com
