bundle:
  name: mentoria

include:
  - resources/jobs/*.yml
  - resources/pipelines/*.yml

artifacts:
  python_artifact:
    type: whl
    build: pip wheel . --no-deps --wheel-dir dist

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use (for sample resources)
  bronze_schema:
    description: The schema to use for bronze layer
  silver_schema:
    description: The schema to use for silver layer
  env:
    description: The environment name (dev, prod, staging, etc.)

resources:
  postgres_projects:
    mentoria_database:
      project_id: 'mentoria-postgres-db'
      display_name: 'Mentoria Lakebase DB'
      pg_version: 17
      enable_pg_native_login: false

  postgres_branches:
    dev_branch:
      parent: ${resources.postgres_projects.mentoria_database.id}
      branch_id: 'dev'
      no_expiry: true

  postgres_endpoints:
    dev_endpoint:
      parent: ${resources.postgres_branches.dev_branch.id}
      endpoint_id: 'primary'
      endpoint_type: 'ENDPOINT_TYPE_READ_ONLY'
      autoscaling_limit_min_cu: 0.5
      autoscaling_limit_max_cu: 1.5
      suspend_timeout_duration: "600s"

targets:
  dev:
    mode: development
    default: true
    workspace:
      #host: ${DATABRICKS_HOST}
      root_path: /Workspace/Users/pcassio23@gmail.com/Mentoria_Dev
    variables:
      catalog: dev_catalog
      schema: bronze
      bronze_schema: bronze
      silver_schema: silver
      env: dev

  prod:
    mode: production
    workspace:
      #host: ${DATABRICKS_HOST}
      root_path: /Workspace/Mentoria_Prod
    variables:
      catalog: prod_catalog
      schema: bronze
      bronze_schema: bronze
      silver_schema: silver
      env: prod
    permissions:
      - level: CAN_MANAGE
        user_name: pcassio23@gmail.com
