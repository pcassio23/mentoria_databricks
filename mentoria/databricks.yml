# This is a Databricks asset bundle definition for mentoria.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: mentoria
  uuid: 81de4d3f-429a-45d4-a1ab-e91fc7b0a99b

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: ${var.databricks_host}
    variables:
      catalog: dev_catalog
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: ${var.databricks_host}
      # We explicitly deploy to /Workspace/Users/pcassio23@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Mentoria/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prod_catalog
      schema: prod
    permissions:
      - user_name: pcassio23@gmail.com
        level: CAN_MANAGE