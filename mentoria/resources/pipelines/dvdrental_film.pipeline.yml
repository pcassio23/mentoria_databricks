# Pipeline configuration for DVD Rental Film data ingestion and transformation
# This pipeline ingests data from PostgreSQL dvdrental database
# and processes it through bronze, silver, and gold layers

resources:
  pipelines:
    pip_dvdrental_film:
      name: pip_dvdrental_film
      catalog: ${var.catalog}
      # Schema removed - each layer will specify its own schema (bronze/silver/gold)
      serverless: true
      root_path: "../../src/pipelines/dvdrental_film"

      libraries:
        - glob:
            include: ../../src/pipelines/dvdrental_film/transformations/**

      environment:
        dependencies:
          # Include dependencies from pyproject.toml
          - --editable ${workspace.file_path}
