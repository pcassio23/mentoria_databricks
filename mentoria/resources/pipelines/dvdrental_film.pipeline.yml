# ============================================================================
# Pipeline: DVD Rental Film Data Processing
# ============================================================================
# 
# Purpose:
#   Ingestion and transformation pipeline for DVD Rental database film data
#   Implements medallion architecture (Bronze → Silver → Gold)
#
# Source:
#   PostgreSQL database: dvdrental
#   Tables: film, film_category, category, language, and related tables
#
# Target Architecture:
#   - Bronze Layer: Raw data ingestion from PostgreSQL
#   - Silver Layer: Cleaned and validated data
#   - Gold Layer: Business-ready analytics tables
#
# Pipeline Type: Lakeflow Spark Declarative Pipeline (Serverless)
#
# Configuration:
#   - Catalog: Configured via ${var.catalog}
#   - Schemas: bronze, silver, gold (configured via variables)
#   - Compute: Serverless (auto-scaling)
#   - Root Path: ../../src/pipelines/dvdrental_film
# ============================================================================

resources:
  pipelines:
    pip_dvdrental_film:
      name: pip_dvdrental_film
      catalog: ${var.catalog}
      schema: ${var.bronze_schema}  # Schema padrão para tabelas bronze
      serverless: true
      root_path: "../../src/pipelines/dvdrental_film"
      
      configuration:
        bundle.catalog: ${var.catalog}
        bundle.silver_schema: ${var.silver_schema}
        bundle.gold_schema: ${var.gold_schema}

      libraries:
        - glob:
            include: ../../src/pipelines/dvdrental_film/transformations/**
