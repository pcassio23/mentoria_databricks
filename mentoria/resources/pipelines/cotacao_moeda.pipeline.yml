resources:
  pipelines:
    pip_cotacao_moeda:
      name: pip_cotacao_moeda
      
      # Schema de destino - bronze layer
      # IMPORTANTE: 'target' define o schema onde as tabelas DLT são criadas
      target: bronze
      catalog: ${var.catalog}
      
      # Modo de operação
      serverless: true
      channel: CURRENT   # Runtime estável e testado
      continuous: false  # Modo triggered (batch), não streaming contínuo
      
      # Paths
      root_path: ${workspace.file_path}/src/pipelines/cotacao_moeda
      
      # Libraries - Preparado para bronze, silver e gold (usa ** recursivo)
      libraries:
        - glob:
            include: ${workspace.file_path}/src/pipelines/cotacao_moeda/bronze/**
        # - glob:
        #     include: ${workspace.file_path}/src/pipelines/cotacao_moeda/silver/**
        # - glob:
        #     include: ${workspace.file_path}/src/pipelines/cotacao_moeda/gold/**
      
      # Configuração passada para o código DLT
      configuration:
        catalog: ${var.catalog}
        bronze_schema: bronze
        silver_schema: silver
        gold_schema: gold
