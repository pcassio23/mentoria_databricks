# ============================================================================
# Synced Table: Filmes Analytics to Lakebase
# ============================================================================
# 
# Purpose:
#   Syncs analytical film data from Unity Catalog to Lakebase Postgres
#   Enables operational analytics and real-time queries on PostgreSQL
#
# Source:
#   Unity Catalog Table: dev_catalog.gold.filmes_analytics
#   Layer: Gold (business-ready analytics)
#
# Destination:
#   Lakebase Catalog: lakebase_catalog.dvdrental.filmes_analytics
#   Physical Table: databricks_postgres.dvdrental.filmes_analytics
#
# Type: postgres_synced_table (Lakebase Autoscaling)
#
# Configuration:
#   - Primary Key: id_filme
#   - Scheduling Policy: SNAPSHOT (full refresh on each sync)
#   - Pipeline: Auto-created and managed by Databricks
# ============================================================================

resources:
  postgres_synced_tables:
    sync_dvdrental_filmes_analytics_v2:
      synced_table_id: "lakebase_catalog.dvdrental.filmes_analytics"
      branch: "${var.lakebase_branch}"
      source_table_full_name: "dev_catalog.gold.filmes_analytics"
      primary_key_columns:
        - "id_filme"
      scheduling_policy: "SNAPSHOT"  # Full refresh mode (não requer CDF)
      postgres_database: "databricks_postgres"
      create_database_objects_if_missing: true
      
      new_pipeline_spec:
        storage_catalog: "${var.catalog}"
        storage_schema: "gold"
