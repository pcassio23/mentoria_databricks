# The main pipeline for mentoria

resources:
  pipelines:
    mentoria_etl:
      name: mentoria_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/pipelines/mentoria_etl"

      libraries:
        - glob:
            include: ../src/pipelines/mentoria_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
